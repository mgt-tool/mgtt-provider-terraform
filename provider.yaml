meta:
  name: terraform
  version: 0.1.0
  description: Terraform-managed infrastructure — state health, resource presence, drift detection, config-vs-reality reasoning
  tags: [iac, terraform, hashicorp]
  requires:
    mgtt: ">=0.1.2"
  command: "$MGTT_PROVIDER_DIR/bin/mgtt-provider-terraform"

# Capabilities the provider needs at probe time — host packages
# and credential chains. Image installs satisfy these via docker-run
# bind mounts and env forwards; git installs inherit them from the
# operator's shell. `network:` is a separate runtime-isolation knob.
# See mgtt docs/reference/image-capabilities.md for the vocabulary.
needs: [terraform, aws]
network: host
hooks:
  install: hooks/install.sh
  uninstall: hooks/uninstall.sh

variables:
  workdir:
    description: path to the Terraform root module (chdir before running terraform)
    required: true
  workspace:
    description: terraform workspace to select before probing
    required: false
    default: default
  tf_bin:
    description: path to the terraform binary
    required: false
    default: terraform


read_only: false
writes_note: |
  The `drifted` fact runs `terraform plan` which refreshes state —
  a write to the state backend (state file). Other facts are pure
  reads. Operators who need strict read-only should bind a credential
  that cannot write to the state backend and omit the `drifted` fact.
