meta:
  name: terraform
  version: 0.1.0
  description: Terraform-managed infrastructure — state health, resource presence, drift detection, config-vs-reality reasoning
  tags: [iac, terraform, hashicorp]
  requires:
    mgtt: ">=0.1.2"
  command: "$MGTT_PROVIDER_DIR/bin/mgtt-provider-terraform"

hooks:
  install: hooks/install.sh
  uninstall: hooks/uninstall.sh

variables:
  workdir:
    description: path to the Terraform root module (chdir before running terraform)
    required: true
  workspace:
    description: terraform workspace to select before probing
    required: false
    default: default
  tf_bin:
    description: path to the terraform binary
    required: false
    default: terraform

auth:
  strategy: environment
  reads_from:
    - TF_VAR_* env vars
    - backend-specific credentials (AWS_*, GOOGLE_*, ARM_*, etc.)
    - .terraform/ directory (provider plugins, locked module versions)
  access:
    probes: terraform read + plan
    # Honest: `terraform plan` (the drift probe) refreshes state, which
    # writes to the state file. Other facts are pure reads. Operators who
    # need strict read-only should bind a credential that cannot write to
    # the state backend and avoid the `drifted` fact.
    writes: state-refresh-on-plan
